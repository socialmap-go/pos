<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting | Social Map</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; text-align: center; margin: 0; padding: 50px 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; box-sizing: border-box; }
    .branding { font-weight: 900; color: #d32f2f; font-size: 24px; margin-bottom: 20px; letter-spacing: 1px; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d32f2f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status-text { color: #555; font-size: 16px; font-weight: bold; margin-top: 10px; }
    .error-box { background: #fde4e4; color: #d32f2f; padding: 20px; border-radius: 10px; border: 1px solid #f5c6c6; display: none; max-width: 400px; margin: 20px auto; }
  </style>
</head>
<body>

  <div class="branding">🔴 SOCIAL MAP</div>
  
  <div id="loadingSection">
    <div class="loader"></div>
    <div class="status-text">කරුණාකර රැඳී සිටින්න...<br>[Processing your request]</div>
  </div>

  <div id="errorBox" class="error-box">
    <h3>ගැටළුවක් මතු විය!</h3>
    <p id="errorMsg"></p>
  </div>

  <script>
    // 👇 ඔයාගේ Web App URL එක හරියටම මෙතනට දාන්න 👇
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzcHuHqBTZbgujvCdEoXOp8FyCWFzTyWB2Sjkwa39z4JQ2lx2dD7XsisJ_BucdPf0c/exec";

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    // Phone එකෙන්ද PC එකෙන්ද ස්කෑන් කරන්නේ කියලා අඳුරගැනීම [Device Detection]
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const device = isMobile ? "Mobile" : "Desktop";

    if(id) {
      // Apps Script එකට scan action එක යැවීම [API Call]
      fetch(`${APPS_SCRIPT_URL}?action=scan&id=${id}&device=${device}`)
        .then(res => res.json())
        .then(data => {
          if(data.error) {
            showError(data.error);
          } else if (data.success) {
            // සාර්ථක නම් අදාළ තැනට යොමු කිරීම [Redirection Logic]
            if (data.destination === "profile") {
              // Smart Profile එකට යවනවා
              window.location.href = `profile/?id=${id}`; 
            } else {
              // WhatsApp හෝ අදාළ ලින්ක් එකට කෙලින්ම යවනවා
              window.location.href = data.destination; 
            }
          }
        })
        .catch(err => {
          showError("අන්තර්ජාල සම්බන්ධතාවය පරීක්ෂා කරන්න. [Network Error]");
        });
    } else {
      showError("කරුණාකර නිවැරදි QR කේතයක් ස්කෑන් කරන්න. [Invalid QR]");
    }

    // දෝෂයක් ආවොත් ලෝඩින් එක නවත්තලා මැසේජ් එක පෙන්වීම [UI Error Handling]
    function showError(msg) {
      document.getElementById('loadingSection').style.display = 'none';
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('errorMsg').innerText = msg;
    }
  </script>
</body>
</html>

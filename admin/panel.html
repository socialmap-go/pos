<!DOCTYPE html><html lang="si"><head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Social Map</title>
  <style>
    body { font-family: sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
    .header { background: #d32f2f; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;}
    .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; flex: 1; min-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px;}
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;}
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: inherit;}
    label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; color: #555;}
    .btn-save { background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px;}
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left;}
    .btn-edit { background: #1976d2; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;}
    
    /* QR Generator Styles */
    .qr-box { background: #e3f2fd; padding: 20px; border-radius: 10px; border: 2px dashed #1976d2; text-align: center;}
    .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .qr-card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    .qr-card img { width: 100%; border-radius: 5px; }
    .btn-download { background: #ff9800; color: white; border: none; padding: 5px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold; }
  </style></head><body>
  <div class="header">
    <h2 style="margin:0;">🔴 ADMIN DASHBOARD</h2>
    <button onclick="sessionStorage.clear(); window.location.href='index.html'" style="padding:8px 15px; cursor:pointer;">Logout</button>
  </div>
  
  <div class="container">
    <div class="card" style="flex: 100%;">
       <h3 style="margin-top:0; color:#1976d2;">🖨️ Automated QR & Table Generator</h3>
       <div class="qr-box">
          <div class="grid-2">
            <div>
              <label>Profile Base URL (ඔබගේ Github Profile ලින්ක් එක)</label>
              <input type="text" id="qr_baseUrl" placeholder="E.g. https://socialmap-go.github.io/go/profile/index.html">
            </div>
            <div>
              <label>Shop ID</label>
              <input type="text" id="qr_shopId" placeholder="E.g. 102">
            </div>
            <div>
              <label>Number of Tables (මේස ගණන)</label>
              <input type="number" id="qr_tableCount" value="5" min="1">
            </div>
          </div>
          <button class="btn-save" style="background:#1976d2; width:auto; padding:10px 30px;" onclick="generateTableQRs()">Generate QRs</button>
       </div>
       <div id="qrResults" class="qr-grid"></div>
    </div>

    </div>

  <script>
    // --- QR GENERATOR LOGIC ---
    function generateTableQRs() {
      const baseUrl = document.getElementById('qr_baseUrl').value.trim();
      const shopId = document.getElementById('qr_shopId').value.trim();
      const count = parseInt(document.getElementById('qr_tableCount').value);
      const resultsDiv = document.getElementById('qrResults');
      
      if(!baseUrl || !shopId || isNaN(count)) { alert("කරුණාකර URL එක, Shop ID එක සහ මේස ගණන ලබා දෙන්න."); return; }
      
      resultsDiv.innerHTML = "";
      
      for(let i = 1; i <= count; i++) {
        let tableNo = i < 10 ? `0${i}` : `${i}`; // 01, 02 format
        // Construct URL: url?id=102&table=Table 01
        let qrUrl = `${baseUrl}?id=${shopId}&table=Table ${tableNo}`;
        let encodedUrl = encodeURIComponent(qrUrl);
        // Using high-res 500x500 QR from api.qrserver
        let qrImgSrc = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodedUrl}&margin=10`;
        
        resultsDiv.innerHTML += `
          <div class="qr-card">
            <strong>Table ${tableNo}</strong>
            <img src="${qrImgSrc}" alt="QR Table ${tableNo}">
            <a href="${qrImgSrc}" download="Table_${tableNo}_QR.png" target="_blank">
              <button class="btn-download">View / Download</button>
            </a>
          </div>
        `;
      }
    }
    // පරණ Admin ෆන්ක්ෂන් ටික (loadCustomers, saveData යනාදිය) එලෙසම පහළින් තබන්න.
  </script>
</body></html>
